name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Backend: lint → test → coverage gate ≥ 80 % for learning.py
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend – Python tests + coverage gate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Security scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Lint (ruff)
        # ruff is not in requirements.txt yet; skip gracefully if absent
        run: |
          if python -c "import ruff" 2>/dev/null; then
            ruff check app tests
          else
            echo "ruff not installed – skipping lint step"
          fi

      - name: Run tests with coverage gate (learning.py ≥ 80 %)
        run: |
          pytest \
            --cov=app/presentation/api/v1/learning \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend: type-check → build
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend – TypeScript + build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security scan (npm audit)
        run: npm audit --audit-level=high

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Avoid failing the build on missing runtime secrets
          NEXT_PUBLIC_API_URL: "http://localhost:8000"

